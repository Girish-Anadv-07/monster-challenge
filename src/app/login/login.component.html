<div class="flex-container">
  <div class="container" id="container" [ngClass]="{ active: isRegistering }">
    <div class="form-container sign-up">
      <form>
        <h1 class="toggle-visibility" [ngClass]="{ hidden: isReseting }">
          Create Account
        </h1>
        <h1 class="toggle-visibility" [ngClass]="{ hidden: !isReseting }">
          Reset Password
        </h1>
        <div class="social-icons">
          <a href="#" class="icon" (click)="googleSignIn($event)">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="250"
              height="40"
              viewBox="0 0 200 48"
            >
              <!-- Google Logo -->
              <g transform="scale(0.8) translate(0,5)">
                <path
                  fill="#FFC107"
                  d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"
                />
                <path
                  fill="#FF3D00"
                  d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"
                />
                <path
                  fill="#4CAF50"
                  d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"
                />
                <path
                  fill="#1976D2"
                  d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"
                />
              </g>

              <!-- Text beside the logo -->
              <text
                x="60"
                y="30"
                font-size="16"
                fill="black"
                font-weight="bold"
                font-family="Arial, sans-serif"
              >
                Sign in with Google
              </text>
            </svg>
          </a>
        </div>
        <span>OR</span>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Email"
        />
        <input
          class="toggle-visibility"
          type="password"
          [(ngModel)]="password"
          [ngClass]="{ hidden: isReseting }"
          name="password"
          placeholder="Password"
        />
        <!-- Error message for login -->
        <div *ngIf="errorMessage" class="error-message">
          {{ errorMessage }}
        </div>
        <div *ngIf="successMessage" class="success-message">
          {{ successMessage }}
        </div>
        <button
          type="button"
          (click)="register()"
          [ngClass]="{ hidden: isReseting }"
          class="toggle-visibility"
        >
          Sign Up
        </button>
        <button
          type="button"
          (click)="resetPassword()"
          [ngClass]="{ hidden: !isReseting }"
          class="toggle-visibility"
        >
          Reset
        </button>
      </form>
    </div>
    <div class="form-container sign-in">
      <form>
        <h1>Sign In</h1>
        <div class="social-icons">
          <a href="#" class="icon" (click)="googleSignIn($event)">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="250"
              height="40"
              viewBox="0 0 200 48"
            >
              <!-- Google Logo -->
              <g transform="scale(0.8) translate(0,5)">
                <path
                  fill="#FFC107"
                  d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"
                />
                <path
                  fill="#FF3D00"
                  d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"
                />
                <path
                  fill="#4CAF50"
                  d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"
                />
                <path
                  fill="#1976D2"
                  d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"
                />
              </g>

              <!-- Text beside the logo -->
              <text
                x="60"
                y="30"
                font-size="16"
                fill="black"
                font-weight="bold"
                font-family="Arial, sans-serif"
              >
                Sign in with Google
              </text>
            </svg>
          </a>
        </div>
        <span>OR</span>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Email"
        />
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Password"
        />
        <!-- Error message for login -->
        <div *ngIf="errorMessage" class="error-message">
          {{ errorMessage }}
        </div>
        <div *ngIf="successMessage" class="success-message">
          {{ successMessage }}
        </div>
        <a href="#" (click)="toggleReset($event)">Forgot Your Password?</a>
        <button type="button" (click)="login()">Login</button>
      </form>
    </div>
    <div class="toggle-container">
      <div class="toggle">
        <div class="toggle-panel toggle-left">
          <h1>Welcome Back!</h1>
          <p>Already have an account?</p>
          <button
            type="button"
            class="hidden"
            id="login"
            (click)="toggleLogin()"
          >
            Sign In
          </button>
        </div>
        <div class="toggle-panel toggle-right">
          <h1>Hello, Friend!</h1>
          <p>Don't have an account?</p>
          <button
            type="button"
            class="hidden"
            id="register"
            (click)="toggleRegister()"
          >
            Sign Up
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
